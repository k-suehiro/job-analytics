<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="gas-service-url" content="__GAS_SERVICE_URL__">
  <title>WDR工数ビューア - 仕様書</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    html { scroll-behavior: smooth; }

    .design-nav a { scroll-margin-top: 5rem; }
    .doc-content { scroll-margin-top: 5rem; }
    .doc-content > *:first-child { margin-top: 0; }

    .doc-content h1 { font-size: 1.75rem; font-weight: 700; color: #0f172a; margin: 0 0 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid #e2e8f0; }
    .doc-content h2 { font-size: 1.35rem; font-weight: 700; color: #1e293b; margin: 2.5rem 0 0.75rem; padding-bottom: 0.35rem; border-bottom: 1px solid #e2e8f0; }
    .doc-content h3 { font-size: 1.1rem; font-weight: 600; color: #334155; margin: 1.75rem 0 0.5rem; }
    .doc-content h4 { font-size: 1rem; font-weight: 600; color: #475569; margin: 1.25rem 0 0.375rem; }
    .doc-content p { margin: 0.75rem 0; line-height: 1.75; color: #334155; }
    .doc-content ul, .doc-content ol { margin: 0.75rem 0; padding-left: 1.5rem; }
    .doc-content ul { list-style-type: disc; }
    .doc-content ol { list-style-type: decimal; }
    .doc-content li { margin: 0.35rem 0; line-height: 1.65; color: #334155; }
    .doc-content li::marker { color: #6366f1; }
    .doc-content strong { font-weight: 600; color: #1e293b; }
    .doc-content a { color: #4f46e5; text-decoration: underline; text-underline-offset: 2px; }
    .doc-content a:hover { color: #4338ca; }
    .doc-content hr { border: none; border-top: 1px solid #e2e8f0; margin: 2rem 0; }
    .doc-content blockquote { border-left: 4px solid #a5b4fc; padding: 0.25rem 0 0.25rem 1rem; margin: 1rem 0; color: #475569; background: #f8fafc; border-radius: 0 0.375rem 0.375rem 0; }
    .doc-content code { font-size: 0.875em; background: #f1f5f9; color: #4338ca; padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .doc-content pre { background: #0f172a; color: #e2e8f0; padding: 1rem 1.25rem; border-radius: 0.5rem; overflow-x: auto; margin: 1rem 0; font-size: 0.8125rem; line-height: 1.6; }
    .doc-content pre code { background: transparent; color: inherit; padding: 0; }
    .doc-content table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.875rem; }
    .doc-content th, .doc-content td { border: 1px solid #e2e8f0; padding: 0.5rem 0.75rem; text-align: left; vertical-align: top; }
    .doc-content th { background: #f8fafc; font-weight: 600; color: #334155; }
    .doc-content tr:nth-child(even) td { background: #fafafa; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

  <header class="bg-gradient-to-r from-slate-700 to-slate-900 sticky top-0 z-40 shadow-md">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-4">
      <div class="min-w-0">
        <h1 class="text-lg sm:text-xl font-bold text-white flex items-center gap-2 flex-wrap">
          <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
          <span>WDR工数ビューア 仕様書</span>
          <span class="text-xs font-normal text-slate-300 bg-white/10 px-2 py-0.5 rounded">{{VERSION}}</span>
        </h1>
        <p class="text-sm text-slate-300 mt-1 hidden sm:block">README.md から自動生成 · {{GENERATED_AT}}</p>
      </div>
      <div class="flex items-center gap-2 shrink-0">
        <a id="helpPageLink" href="help.html" target="_top" class="text-sm font-medium text-white/90 hover:text-white border border-white/30 hover:border-white/50 px-3 py-1.5 rounded-lg hover:bg-white/10 transition whitespace-nowrap">ヘルプ</a>
        <a id="appPageLink" href="index.html" target="_top" class="text-sm font-medium text-white/90 hover:text-white border border-white/30 hover:border-white/50 px-3 py-1.5 rounded-lg hover:bg-white/10 transition whitespace-nowrap">アプリ</a>
      </div>
    </div>
  </header>

  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-8">
    <div class="mb-6 rounded-lg border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-900">
      このファイルは <code class="bg-amber-100 px-1 rounded">README.md</code> から <code class="bg-amber-100 px-1 rounded">npm run build:design</code> で自動生成されています。仕様の正本は README.md です。手編集しないでください。
    </div>

    <div class="lg:grid lg:grid-cols-[14rem_minmax(0,1fr)] lg:gap-8">
      <nav class="design-nav hidden lg:block">
        <div class="sticky top-24 bg-white border border-slate-200 rounded-xl p-4 shadow-sm text-sm max-h-[calc(100vh-7rem)] overflow-y-auto">
          <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">目次</p>
          <ul class="space-y-1.5 text-slate-600">
            {{TOC_HTML}}
          </ul>
        </div>
      </nav>

      <article class="doc-content bg-white border border-slate-200 rounded-xl p-5 sm:p-8 shadow-sm min-w-0">
        {{CONTENT_HTML}}
      </article>
    </div>

    <footer class="text-center text-xs text-slate-400 py-8">
      Generated from README.md · WDR工数ビューア {{VERSION}}
    </footer>
  </div>

  <script>
    (function initDesignGasLinks() {
      var meta = document.querySelector('meta[name="gas-service-url"]');
      var serviceUrl = meta ? String(meta.getAttribute('content') || '').trim() : '';
      if (!serviceUrl || serviceUrl === '__GAS_SERVICE_URL__' || !/^https?:\/\//i.test(serviceUrl)) return;

      function buildUrl(page) {
        var u = new URL(serviceUrl);
        if (page) u.searchParams.set('page', page);
        else u.searchParams.delete('page');
        var ak = new URLSearchParams(window.location.search).get('ak');
        if (ak) u.searchParams.set('ak', ak);
        return u.toString();
      }

      var app = document.getElementById('appPageLink');
      var help = document.getElementById('helpPageLink');
      if (app) { app.href = buildUrl(''); app.target = '_top'; }
      if (help) { help.href = buildUrl('help'); help.target = '_top'; }
    })();
  </script>
</body>
</html>
